# Nekazari Odoo ERP Module - Backend Deployment
#
# FastAPI orchestration backend for Odoo integration.
#
# Author: Kate Benetis <kate@robotika.cloud>
# Company: Robotika
# License: AGPL-3.0

apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo-backend
  namespace: nekazari
  labels:
    app: odoo-backend
    module: odoo-erp
    nekazari.io/profile: addon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: odoo-backend
  template:
    metadata:
      labels:
        app: odoo-backend
        module: odoo-erp
    spec:
      containers:
        - name: api
          image: ghcr.io/nkz-os/nkz-module-odoo:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            # Database
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: postgres-url
            # Odoo connection
            - name: ODOO_HOST
              value: "odoo-service"
            - name: ODOO_PORT
              value: "8069"
            - name: ODOO_MASTER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-secret
                  key: master-password
            - name: ODOO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-secret
                  key: odoo-admin-password
                  optional: true
            - name: ODOO_TEMPLATE_DB
              value: "nkz_odoo_template"
            # Odoo DB
            - name: ODOO_DB_HOST
              value: "postgres-odoo-service"
            - name: ODOO_DB_PORT
              value: "5432"
            - name: ODOO_DB_USER
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: username
            - name: ODOO_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: odoo-db-secret
                  key: password
            # Redis
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: REDIS_URL
            # Keycloak, NGSI-LD, N8N, Intelligence, CORS (from ConfigMap; replace placeholders at deploy)
            - name: KEYCLOAK_URL
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: KEYCLOAK_URL
            - name: KEYCLOAK_REALM
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: KEYCLOAK_REALM
            - name: KEYCLOAK_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: KEYCLOAK_CLIENT_ID
            - name: KEYCLOAK_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: KEYCLOAK_PUBLIC_URL
            - name: ODOO_OAUTH_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: ODOO_OAUTH_CLIENT_ID
            - name: ORION_URL
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: ORION_URL
            - name: N8N_URL
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: N8N_URL
            - name: N8N_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: odoo-secret
                  key: n8n-webhook-secret
                  optional: true
            - name: INTELLIGENCE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: INTELLIGENCE_API_URL
            - name: ALLOWED_ORIGINS_STR
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: ALLOWED_ORIGINS_STR
            - name: ODOO_URL
              valueFrom:
                configMapKeyRef:
                  name: odoo-config
                  key: ODOO_URL
            - name: LIFECYCLE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: module-lifecycle-secret
                  key: LIFECYCLE_WEBHOOK_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/odoo/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/odoo/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: odoo-backend-service
  namespace: nekazari
  labels:
    app: odoo-backend
spec:
  selector:
    app: odoo-backend
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
