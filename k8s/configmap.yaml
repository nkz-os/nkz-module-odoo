# Nekazari Odoo ERP Module - ConfigMap
#
# Non-sensitive configuration. Replace YOUR_DOMAIN (or override at deploy) for your
# environment so the module works on any domain. No hardcoded production domains.
#
# Author: Kate Benetis <kate@robotika.cloud>
# Company: Robotika
# License: AGPL-3.0

apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-config
  namespace: nekazari
  labels:
    app: odoo
    module: odoo-erp
data:
  ODOO_TEMPLATE_DB: "nkz_odoo_template"

  ORION_URL: "http://orion-ld-service:1026"
  N8N_URL: "http://n8n-service:5678"
  INTELLIGENCE_API_URL: "http://intelligence-api-service:8000"
  REDIS_URL: "redis://redis-service:6379/0"

  # Replace YOUR_DOMAIN with your auth host (e.g. auth.example.com)
  KEYCLOAK_URL: "https://auth.YOUR_DOMAIN/auth"
  KEYCLOAK_REALM: "nekazari"
  KEYCLOAK_CLIENT_ID: "nekazari-api"

  # Comma-separated origins for CORS. Replace YOUR_DOMAIN with frontend and Odoo hosts.
  ALLOWED_ORIGINS_STR: "https://frontend.YOUR_DOMAIN,https://odoo.YOUR_DOMAIN"

  # Public URL for "Open Odoo" links. Empty = relative paths.
  # If Odoo is exposed under the API host, use e.g. https://nkz.YOUR_DOMAIN/odoo
  ODOO_URL: "https://nkz.YOUR_DOMAIN/odoo"
