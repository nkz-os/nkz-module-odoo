# Nekazari Odoo ERP Module - ConfigMap
#
# Non-sensitive configuration. Replace YOUR_DOMAIN at deploy time for your
# environment (e.g. via sed, kustomize, or manual edit on the server).
#
# Author: Kate Benetis <kate@robotika.cloud>
# Company: Robotika
# License: AGPL-3.0

apiVersion: v1
kind: ConfigMap
metadata:
  name: odoo-config
  namespace: nekazari
  labels:
    app: odoo
    module: odoo-erp
data:
  ODOO_TEMPLATE_DB: "nkz_odoo_template"

  ORION_URL: "http://orion-ld-service:1026"
  N8N_URL: "http://n8n-service:5678"
  INTELLIGENCE_API_URL: "http://intelligence-api-service:8000"
  REDIS_URL: "redis://redis-service:6379/0"

  # Internal Keycloak URL (K8s service DNS)
  KEYCLOAK_URL: "http://keycloak:8080/auth"
  KEYCLOAK_REALM: "nekazari"
  KEYCLOAK_CLIENT_ID: "nekazari-api"

  # Public Keycloak URL (as seen by browsers, for OAuth redirects)
  KEYCLOAK_PUBLIC_URL: "https://auth.robotika.cloud/auth"

  # Keycloak client ID for Odoo OAuth SSO
  ODOO_OAUTH_CLIENT_ID: "nekazari-odoo"

  # Comma-separated origins for CORS
  ALLOWED_ORIGINS_STR: "https://nekazari.robotika.cloud,https://odoo.robotika.cloud"

  # Public URL for Odoo web UI (subdomain)
  ODOO_URL: "https://odoo.robotika.cloud"
