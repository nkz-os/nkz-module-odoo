# Nekazari Odoo ERP Module - Ingress Configuration
#
# Module frontend is served from MinIO (same as other modules): host loads
# /modules/odoo-erp/nkz-module.js via frontend-static -> MinIO. No frontend pod.
#
# API: nkz.robotika.cloud  |  Odoo app: odoo.robotika.cloud
#
# Author: Kate Benetis <kate@robotika.cloud>
# Company: Robotika
# License: AGPL-3.0

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: odoo-api-ingress
  namespace: nekazari
  labels:
    app: odoo-backend
    module: odoo-erp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: nkz.robotika.cloud
      http:
        paths:
          - path: /api/odoo
            pathType: Prefix
            backend:
              service:
                name: odoo-backend-service
                port:
                  number: 80
  tls:
    - hosts:
        - nkz.robotika.cloud
      secretName: nkz-tls

---
# Odoo app on dedicated subdomain (odoo.robotika.cloud)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: odoo-headers
  namespace: nekazari
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
      X-Forwarded-Host: "odoo.robotika.cloud"

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: odoo-direct-ingress
  namespace: nekazari
  labels:
    app: odoo
    module: odoo-erp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: nekazari-odoo-headers@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: odoo.robotika.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: odoo-service
                port:
                  number: 8069
  tls:
    - hosts:
        - odoo.robotika.cloud
      secretName: odoo-tls
