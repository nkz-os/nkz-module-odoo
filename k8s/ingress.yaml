# Nekazari Odoo ERP Module - Ingress
#
# Module frontend: served from MinIO; host loads /modules/odoo-erp/nkz-module.js.
#
# Replace YOUR_DOMAIN with your deployment domain. Use the same API host as your
# main platform if combined (e.g. nkz.YOUR_DOMAIN); otherwise api.YOUR_DOMAIN.
#
# Author: Kate Benetis <kate@robotika.cloud>
# Company: Robotika
# License: AGPL-3.0

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: odoo-api-ingress
  namespace: nekazari
  labels:
    app: odoo-backend
    module: odoo-erp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: api.YOUR_DOMAIN
      http:
        paths:
          - path: /api/odoo
            pathType: Prefix
            backend:
              service:
                name: odoo-backend-service
                port:
                  number: 80
  tls:
    - hosts:
        - api.YOUR_DOMAIN
      secretName: nkz-tls

---
# Middleware: set X-Forwarded-Host so Odoo builds correct URLs (replace YOUR_DOMAIN).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: odoo-headers
  namespace: nekazari
spec:
  headers:
    customRequestHeaders:
      X-Forwarded-Proto: "https"
      X-Forwarded-Host: "odoo.YOUR_DOMAIN"

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: odoo-direct-ingress
  namespace: nekazari
  labels:
    app: odoo
    module: odoo-erp
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: nekazari-odoo-headers@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: odoo.YOUR_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: odoo-service
                port:
                  number: 8069
  tls:
    - hosts:
        - odoo.YOUR_DOMAIN
      secretName: odoo-tls
